version: '3.9'
services:
  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: vas_lab
      MYSQL_USER: vas_user
      MYSQL_PASSWORD: vas_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "vas_user", "-pvas_password"]
      interval: 5s
      timeout: 5s
      retries: 20
  core-network-mock:
    build: ./core-network-mock
    ports:
      - "3007:3007"
  ussd-gateway:
    build: ./ussd-gateway
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: vas_user
      DB_PASSWORD: vas_password
      DB_NAME: vas_lab
    depends_on:
      mysql-db:
        condition: service_healthy
  vas-platform:
    build: ./vas-platform
    ports:
      - "3002:3002"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: vas_user
      DB_PASSWORD: vas_password
      DB_NAME: vas_lab
    depends_on:
      mysql-db:
        condition: service_healthy
      ocs-service:
        condition: service_started
  crm-service:
    build: ./crm-service
    ports:
      - "3003:3003"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: vas_user
      DB_PASSWORD: vas_password
      DB_NAME: vas_lab
    depends_on:
      mysql-db:
        condition: service_healthy
  ocs-service:
    build: ./ocs-service
    ports:
      - "3004:3004"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: vas_user
      DB_PASSWORD: vas_password
      DB_NAME: vas_lab
    depends_on:
      mysql-db:
        condition: service_healthy
  smsc-service:
    build: ./smsc-service
    ports:
      - "3005:3005"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: vas_user
      DB_PASSWORD: vas_password
      DB_NAME: vas_lab
    depends_on:
      mysql-db:
        condition: service_healthy
  aggregator-service:
    build: ./aggregator-service
    ports:
      - "3006:3006"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: vas_user
      DB_PASSWORD: vas_password
      DB_NAME: vas_lab
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql-data:
